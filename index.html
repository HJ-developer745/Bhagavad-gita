<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Time Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.chat-container{
width:380px;
height:600px;
background:#1e293b;
border-radius:12px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#2563eb;
padding:15px;
text-align:center;
font-size:20px;
}

.messages{
flex:1;
padding:10px;
overflow-y:auto;
}

.message{
margin:6px 0;
padding:10px;
border-radius:8px;
max-width:75%;
}

.me{
background:#3b82f6;
align-self:flex-end;
}

.other{
background:#475569;
align-self:flex-start;
}

.input-area{
display:flex;
padding:10px;
background:#111827;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

button{
margin-left:5px;
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">Chat Room</div>

<div class="messages" id="messages"></div>

<div class="input-area">
<input id="messageInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

let user = "User" + Math.floor(Math.random()*1000)

function loadMessages(){

let messages = JSON.parse(localStorage.getItem("chatMessages")) || []

let box = document.getElementById("messages")
box.innerHTML=""

messages.forEach(m => {

let div = document.createElement("div")

div.classList.add("message")

if(m.user === user){
div.classList.add("me")
}else{
div.classList.add("other")
}

div.innerText = m.user + ": " + m.text

box.appendChild(div)

})

box.scrollTop = box.scrollHeight

}

function sendMessage(){

let input = document.getElementById("messageInput")
let text = input.value

if(text === "") return

let messages = JSON.parse(localStorage.getItem("chatMessages")) || []

messages.push({
user:user,
text:text
})

localStorage.setItem("chatMessages", JSON.stringify(messages))

input.value=""

loadMessages()

}

window.addEventListener("storage", loadMessages)

loadMessages()

</script>

</body>
</html>
